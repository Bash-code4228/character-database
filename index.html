<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Lore Vault</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app-container">
        <!-- Header / Navigation -->
        <header class="app-header">
            <h1>📜 Character Lore Vault</h1>
            <nav class="tab-nav">
                <button class="tab-btn active" data-tab="original">Original Lore</button>
                <button class="tab-btn" data-tab="existing">Existing Characters</button>
            </nav>
        </header>

        <!-- ============================================ -->
        <!-- ORIGINAL LORE TAB -->
        <!-- ============================================ -->
        <section id="original-tab" class="tab-content active">
            <!-- Sub-navigation for Original -->
            <div class="sub-nav">
                <button class="sub-tab-btn active" data-subtab="original-gallery">Gallery</button>
                <button class="sub-tab-btn" data-subtab="original-graph">Graph View</button>
            </div>

            <!-- Original Gallery -->
            <div id="original-gallery" class="sub-tab-content active">
                <div class="story-filters" data-universe="original">
                    <button class="filter-btn active" data-story="all">All Stories</button>
                    <button class="filter-btn" data-story="The Last Kingdom">The Last Kingdom</button>
                    <button class="filter-btn" data-story="Starfall Chronicles">Starfall Chronicles</button>
                    <button class="filter-btn" data-story="Mystic Harbor">Mystic Harbor</button>
                </div>
                
                <!-- ✅ ADD THIS: Add Character button for Original Lore -->
                <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem; flex-shrink: 0;">
                    <button class="add-character-btn" data-universe="original" style="background: rgba(180, 140, 220, 0.15); border: 1px solid rgba(180, 140, 220, 0.3); color: #c8b0e8; padding: 0.5rem 1.2rem; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s;">
                        ➕ Add Character
                    </button>
                </div>
                <!-- ✅ END ADD -->

                <div class="gallery-grid" id="originalGrid"></div>
            </div>

            <!-- Original Graph -->
            <div id="original-graph" class="sub-tab-content">
                <div class="graph-controls">
                    <button class="toggle-labels" data-universe="original">Toggle Labels</button>
                    <button class="reset-graph" data-universe="original">Reset View</button>
                    <span class="graph-hint">Drag to pan · Scroll to zoom</span>
                </div>
                <div class="graph-container" id="originalGraphContainer">
                    <svg class="graph-svg" width="100%" height="100%"></svg>
                </div>
            </div>
        </section>

        <!-- ============================================ -->
        <!-- EXISTING CHARACTERS TAB -->
        <!-- ============================================ -->
        <section id="existing-tab" class="tab-content">
            <!-- Sub-navigation for Existing -->
            <div class="sub-nav">
                <button class="sub-tab-btn active" data-subtab="existing-gallery">Gallery</button>
                <button class="sub-tab-btn" data-subtab="existing-graph">Graph View</button>
            </div>

            <!-- Existing Gallery -->
            <div id="existing-gallery" class="sub-tab-content active">
                <div class="story-filters" data-universe="existing">
                    <button class="filter-btn active" data-story="all">All Universes</button>
                    <button class="filter-btn" data-story="Marvel">Marvel</button>
                    <button class="filter-btn" data-story="DC">DC</button>
                    <button class="filter-btn" data-story="Anime">Anime</button>
                </div>
                
                <!-- ✅ ADD THIS: Add Character button for Existing Characters -->
                <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem; flex-shrink: 0;">
                    <button class="add-character-btn" data-universe="existing" style="background: rgba(180, 140, 220, 0.15); border: 1px solid rgba(180, 140, 220, 0.3); color: #c8b0e8; padding: 0.5rem 1.2rem; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s;">
                        ➕ Add Character
                    </button>
                </div>
                <!-- ✅ END ADD -->

                <div class="gallery-grid" id="existingGrid"></div>
            </div>

            <!-- Existing Graph -->
            <div id="existing-graph" class="sub-tab-content">
                <div class="graph-controls">
                    <button class="toggle-labels" data-universe="existing">Toggle Labels</button>
                    <button class="reset-graph" data-universe="existing">Reset View</button>
                    <span class="graph-hint">Drag to pan · Scroll to zoom</span>
                </div>
                <div class="graph-container" id="existingGraphContainer">
                    <svg class="graph-svg" width="100%" height="100%"></svg>
                </div>
            </div>
        </section>

        <!-- ============================================ -->
        <!-- MODALS -->
        <!-- ============================================ -->

        <!-- Character Detail Modal -->
        <div class="modal" id="detailModal">
            <div class="modal-content">
                <span class="modal-close">&times;</span>
                <div id="modalBody"></div>
            </div>
        </div>

        <!-- ✅ ADD THIS: Add Character Modal -->
        <div class="modal" id="addCharacterModal">
            <div class="modal-content" style="max-width: 500px;">
                <span class="modal-close add-modal-close">&times;</span>
                <h2 style="margin-bottom: 0.5rem;">➕ Add New Character</h2>
                <p style="color: #8888aa; margin-bottom: 1.5rem; font-size: 0.9rem;">
                    Adding to: <span id="addUniverse" style="color: #c8b0e8;">Original Lore</span>
                </p>
                
                <form id="addCharacterForm">
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; color: #aaa; margin-bottom: 0.3rem; font-size: 0.85rem;">Name *</label>
                        <input type="text" id="charName" required style="width: 100%; padding: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e0e0e0; font-size: 0.95rem;">
                    </div>
                    
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; color: #aaa; margin-bottom: 0.3rem; font-size: 0.85rem;">Role *</label>
                        <input type="text" id="charRole" required style="width: 100%; padding: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e0e0e0; font-size: 0.95rem;">
                    </div>
                    
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; color: #aaa; margin-bottom: 0.3rem; font-size: 0.85rem;">Story/Universe *</label>
                        <input type="text" id="charStory" required style="width: 100%; padding: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e0e0e0; font-size: 0.95rem;">
                    </div>
                    
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; color: #aaa; margin-bottom: 0.3rem; font-size: 0.85rem;">Description *</label>
                        <textarea id="charDescription" required rows="3" style="width: 100%; padding: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e0e0e0; font-size: 0.95rem; resize: vertical;"></textarea>
                    </div>
                    
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; color: #aaa; margin-bottom: 0.3rem; font-size: 0.85rem;">Relationships (comma-separated IDs)</label>
                        <input type="text" id="charRelationships" placeholder="e.g. tony, steve, natasha" style="width: 100%; padding: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e0e0e0; font-size: 0.95rem;">
                    </div>
                    
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; color: #aaa; margin-bottom: 0.3rem; font-size: 0.85rem;">Background Image URL</label>
                        <input type="url" id="charBackground" placeholder="https://example.com/image.jpg" style="width: 100%; padding: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e0e0e0; font-size: 0.95rem;">
                    </div>
                    
                    <button type="submit" style="width: 100%; padding: 0.7rem; background: rgba(180, 140, 220, 0.2); border: 1px solid rgba(180, 140, 220, 0.3); border-radius: 12px; color: #c8b0e8; font-size: 1rem; cursor: pointer; transition: all 0.3s;">
                        ✨ Add Character
                    </button>
                </form>
            </div>
        </div>
        <!-- ✅ END ADD -->

    </div>

    <script src="script.js"></script>
</body>
</html>
